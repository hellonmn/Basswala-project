<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Rental - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .location-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .location-info .status {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .location-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            color: #667eea;
        }

        .location-details {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #0a0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .location-permission {
            text-align: center;
            padding: 20px;
        }

        .location-permission button {
            margin-top: 15px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
        }

        .name-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎧 DJ Rental</h1>
            <p>Find the perfect DJ for your event</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="error" class="error-message"></div>
        <div id="success" class="success-message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #667eea;">Processing...</p>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-container active">
            <div class="location-info" id="location-info-login">
                <div class="status">
                    <svg class="location-icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                    </svg>
                    <span id="location-status-login">Detecting location...</span>
                </div>
                <div class="location-details" id="location-details-login"></div>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email or Phone</label>
                    <input type="text" id="login-email" placeholder="Enter your email or phone" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-container">
            <div class="location-info" id="location-info-register">
                <div class="status">
                    <svg class="location-icon" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                    </svg>
                    <span id="location-status-register">Detecting location...</span>
                </div>
                <div class="location-details" id="location-details-register"></div>
            </div>

            <form onsubmit="handleRegister(event)">
                <div class="name-group">
                    <div class="form-group">
                        <label for="register-firstname">First Name</label>
                        <input type="text" id="register-firstname" placeholder="First name" required>
                    </div>

                    <div class="form-group">
                        <label for="register-lastname">Last Name</label>
                        <input type="text" id="register-lastname" placeholder="Last name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="register-phone">Phone Number</label>
                    <input type="tel" id="register-phone" placeholder="10-digit phone number" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Minimum 6 characters" minlength="6" required>
                </div>

                <button type="submit" class="btn">Create Account</button>
            </form>
        </div>

        <div class="footer-text">
            By continuing, you agree to our Terms & Privacy Policy
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'http://localhost:5000/api';
        
        // Location state
        let currentLocation = {
            latitude: null,
            longitude: null,
            address: {}
        };

        // Switch between tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            
            hideMessages();
        }

        // Get user's location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        currentLocation.latitude = position.coords.latitude;
                        currentLocation.longitude = position.coords.longitude;
                        
                        // Reverse geocode to get address
                        reverseGeocode(currentLocation.latitude, currentLocation.longitude);
                    },
                    error => {
                        updateLocationUI('Unable to detect location', false);
                        console.error('Geolocation error:', error);
                    }
                );
            } else {
                updateLocationUI('Location not supported', false);
            }
        }

        // Reverse geocode coordinates to address
        async function reverseGeocode(lat, lng) {
            try {
                // Using OpenStreetMap's Nominatim API (free, no API key required)
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
                );
                const data = await response.json();
                
                if (data && data.address) {
                    currentLocation.address = {
                        street: data.address.road || '',
                        city: data.address.city || data.address.town || data.address.village || '',
                        state: data.address.state || '',
                        zipCode: data.address.postcode || '',
                        country: data.address.country || ''
                    };
                    
                    const addressText = `${currentLocation.address.city}, ${currentLocation.address.state}`;
                    updateLocationUI(`Location: ${addressText}`, true);
                } else {
                    updateLocationUI('Location detected', true);
                }
            } catch (error) {
                console.error('Geocoding error:', error);
                updateLocationUI('Location detected', true);
            }
        }

        // Update location UI
        function updateLocationUI(statusText, success) {
            const statusElements = ['location-status-login', 'location-status-register'];
            const detailElements = ['location-details-login', 'location-details-register'];
            
            statusElements.forEach(id => {
                const element = document.getElementById(id);
                element.textContent = statusText;
                element.style.color = success ? '#0a0' : '#c00';
            });
            
            if (success && currentLocation.latitude) {
                const detailText = `Lat: ${currentLocation.latitude.toFixed(4)}, Lng: ${currentLocation.longitude.toFixed(4)}`;
                detailElements.forEach(id => {
                    document.getElementById(id).textContent = detailText;
                });
            }
        }

        // Show/hide messages
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();
            showLoading(true);

            const emailOrPhone = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            // Determine if input is email or phone
            const isEmail = emailOrPhone.includes('@');
            const payload = {
                [isEmail ? 'email' : 'phone']: emailOrPhone,
                password: password,
                location: currentLocation
            };

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                showLoading(false);

                if (data.success) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to dashboard (you'll create this page)
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showError(data.message || 'Login failed. Please try again.');
                }
            } catch (error) {
                showLoading(false);
                showError('Network error. Please check your connection.');
                console.error('Login error:', error);
            }
        }

        // Handle registration
        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();
            showLoading(true);

            const payload = {
                firstName: document.getElementById('register-firstname').value,
                lastName: document.getElementById('register-lastname').value,
                email: document.getElementById('register-email').value,
                phone: document.getElementById('register-phone').value,
                password: document.getElementById('register-password').value,
                location: currentLocation
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                showLoading(false);

                if (data.success) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showSuccess('Registration successful! Redirecting...');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showError(data.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                showLoading(false);
                showError('Network error. Please check your connection.');
                console.error('Registration error:', error);
            }
        }

        // Initialize location on page load
        window.onload = function() {
            getLocation();
        };
    </script>
</body>
</html>
